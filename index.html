<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>TimeWheel Demo</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="layout">
    <!-- Links: Control Panel -->
    <aside id="controls" class="panel">
      <h3>Controls</h3>

      <div class="field">
        <label>Axes Arrangement</label>
        <select id="arrangement">
          <option value="coordinatesWheel">Coordinates Wheel</option>
          <option value="parallel">Parallel (optional)</option>
        </select>
      </div>

      <div class="field">
        <label>Variables and Axes</label>
        <ul id="axisList" class="axis-list"></ul>

        <div class="row" style="margin-top:6px;">
          <button id="btnUp" title="Move up">▲</button>
          <button id="btnDown" title="Move down">▼</button>
          <button id="btnRemove" title="Remove axis">✖</button>
        </div>

        <div class="field small">
          <label>Axes Type</label>
          <select id="axisType">
            <option value="scroll">Scroll Axis</option>
            <option value="static">Static Axis</option>
          </select>
        </div>

        <div class="field small">
          <label>Axes Linking</label>
          <select id="linking">
            <option value="none">No Linking</option>
            <option value="range">Range Linking</option>
            <option value="highlight">Highlight Linking</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button id="btnAddAll" title="Add default climate axes">+ Add defaults</button>
        <button id="btnReset">Reset</button>
      </div>
    </aside>

    <!-- Rechts: Canvas + Table -->
    <main class="stage">
      <div class="canvas-and-table">
        <!-- Canvas Section -->
        <div class="canvas-section">
          <div class="topbar">
            <button id="prevMonth">←</button>
            <div id="dateDisplay"></div>
            <button id="nextMonth">→</button>
          </div>
          <canvas id="glCanvas" width="600" height="600"></canvas>
        </div>

        <!-- Table Section -->
        <div class="table-section">
          <div id="tableContainer" class="table-wrapper">
            <!-- populated by JavaScript -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="readCSV.js"></script>
  <script src="main.js"></script>
</body>
</html>
